<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ панель</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-protected="admin">

  <header class="header">
    <div class="logo-box">
      <img src="images/logo.png" alt="Логотип" class="logo-image" onerror="this.src='https://placehold.co/48x48'">
      <a href="index.html" class="logo">Корочки<span>.есть</span></a>
    </div>
    <nav class="nav">
      <button type="button" class="link-button" id="logoutBtn">Выйти</button>
    </nav>
  </header>

  <main class="page">
    <div class="admin-panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: white;">Все заявки</h2>
        <button id="refreshAdminBtn" style="background: #2563eb; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer;">🔄 Обновить</button>
      </div>
      <div id="adminRequestsList" class="requests admin-requests"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <img src="images/footer-image.jpg" alt="Картинка" class="footer-image" onerror="this.src='https://placehold.co/220x130'">
      <div class="footer-text">
        <h3>Корочки.есть</h3>
        <p>Система подачи заявок на образовательные курсы.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>

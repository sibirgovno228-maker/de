<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизация</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
<div class="logo-box">
<img src="images/logo.png" alt="Логотип" class="logo-image">
<a href="index.html" class="logo">Корочки<span>.есть</span></a>
</div>
<nav class="nav">
<a href="register.html">Регистрация</a>
</nav>
</header>

<main class="page">
<section class="form-card">
<h1>Авторизация</h1>
<form id="loginForm">
<div class="field">
<label>Логин</label>
<input id="authLogin" type="text" placeholder="Введите логин" required>
</div>
<div class="field">
<label>Пароль</label>
<input id="authPassword" type="password" placeholder="Введите пароль" required>
</div>

<button class="btn">Войти</button>
<p class="message" id="loginMessage"></p>
</form>
</section>
</main>

<footer class="footer">
<div class="footer-content">
<img src="images/footer-image.jpg" alt="Картинка" class="footer-image">
<div class="footer-text">
<h3>Корочки.есть</h3>
<p>Система подачи заявок на образовательные курсы.</p>
</div>
</div>
</footer>

<script src="script.js"></script>
</body>
</html>
